version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tasks_postgres  # Исправлено: container-naime -> container_name
    environment:
      POSTGRES_DB: taskdb
      POSTGRES_USER: taskuser
      POSTGRES_PASSWORD: taskpass

    ports:                          
      - "5432:5432"                 

    volumes:                       
      - postgres_data:/var/lib/postgresql/data           
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql  

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskuser -d taskdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:                            
  postgres_data: